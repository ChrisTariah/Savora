<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savora - Login / Sign Up</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-box">

            <!-- Savora Branding -->
            <h1 class="auth-logo">Savora</h1>
            <p class="auth-subtitle">Cook smarter. Eat better.</p>

            <!-- Toggle Buttons -->
            <div class="toggle-buttons">
                <button type="button" id="loginToggle" class="active">Login</button>
                <button type="button" id="signupToggle">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="form active-form">
                <h2>Welcome Back 👋</h2>

                <input type="email" placeholder="Email" required />
                <input type="password" placeholder="Password" required />

                <a href="#" class="forgot-link">Forgot Password?</a>

                <button type="submit">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="form">
                <h2>Create Account ✨</h2>

                <input type="text" placeholder="Full Name" required />
                <input type="email" placeholder="Email" required />
                <input type="password" placeholder="Password" required />

                <button type="submit">Sign Up</button>
            </form>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<script src="script.js"></script>
</body>
</html>
