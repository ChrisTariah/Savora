<!DOCTYPE html>
<html>
<head>
  <title>Recipe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Recipe Details</h1>
  <a href="/static/recipes.html">← Back to all recipes</a>
</header>

<div class="container">
  <h2 id="recipe-name"></h2>
  <img id="recipe-image" class="recipe-detail-img">

  <p id="recipe-instructions"></p>
<h3>Tags</h3>
<ul id="recipe-tags"></ul>
  <h3>Ingredients</h3>
  <ul id="recipe-ingredients"></ul>
</div>

<!--AI CHAT BOX -->
<img src="/static/ai_avatar.jpg" id="ai-btn"
     style="position:fixed;bottom:20px;right:20px;width:50px;height:50px;cursor:pointer;">

<div id="ai-chat" style="display:none;position:fixed;bottom:80px;right:20px;width:300px;height:400px;background:#fff;border:1px solid #ccc;padding:10px;overflow:auto;">
  <div id="chat-messages"></div>
  <input id="chat-input" placeholder="Ask me a recipe..." style="width:75%;">
  <button onclick="sendMessage()">Send</button>

</div>

<script src="/static/ai.js"></script>
<script src="/static/recipe.js"></script>
</body>
</html>
